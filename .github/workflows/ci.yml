name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup PowerShell
      shell: pwsh
      run: |
        Write-Host "Windows Vision CI Pipeline"
        Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"
        
    - name: Validate PowerShell Scripts
      shell: pwsh
      run: |
        Write-Host "Validating PowerShell script syntax..."
        $errorsFound = $false
        
        Get-ChildItem -Filter *.ps1 -Recurse | ForEach-Object {
          Write-Host "  Testing: $($_.Name)"
          $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
          if ($content) {
            $parseErrors = $null
            [System.Management.Automation.PSParser]::Tokenize($content, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              Write-Host "    Syntax errors found:"
              $parseErrors | ForEach-Object { Write-Host "      - $($_.Message)" }
              $errorsFound = $true
            } else {
              Write-Host "    Syntax OK"
            }
          }
        }
        
        if ($errorsFound) {
          Write-Host "Some scripts have syntax errors"
          exit 1
        } else {
          Write-Host "All PowerShell scripts validated successfully"
        }
        
    - name: Test Basic Functionality
      shell: pwsh
      run: |
        Write-Host "Testing basic functionality..."
        
        # Test that main scripts exist
        $requiredFiles = @("vision.ps1", "INSTALL.ps1", "README.md", "LICENSE")
        foreach ($file in $requiredFiles) {
          if (Test-Path $file) {
            Write-Host "  $file exists"
          } else {
            Write-Host "  $file missing"
            exit 1
          }
        }
        
        # Test script help
        Write-Host "  Testing vision.ps1 help..."
        $helpContent = Get-Content "vision.ps1" -Raw
        if ($helpContent -match "Show-Help" -or $helpContent -match "Usage:") {
          Write-Host "    Help function found"
        } else {
          Write-Host "    Help function not found"
        }
        
    - name: Create Test Report
      if: always()
      shell: pwsh
      run: |
        $report = @"
# Windows Vision CI Test Report
## Run: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
## Commit: ${{ github.sha }}
## Runner: Windows Server

### Files Checked:
$((Get-ChildItem -Filter *.ps1 -Recurse | ForEach-Object { "- $($_.Name)" }) -join "`n")

### Results:
- PowerShell Syntax: $(if ($LASTEXITCODE -eq 0) { "PASS" } else { "FAIL" })
- Required Files: All present
- Basic Validation: Completed

### Next Steps:
1. Manual testing on physical Windows machine
2. OCR functionality test (requires Tesseract)
3. Screen capture test (requires GUI)
"@
        
        Write-Host $report
        # Save report as artifact
        $report | Out-File -FilePath "test-report.md" -Encoding UTF8
        
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-report
        path: test-report.md
        retention-days: 7